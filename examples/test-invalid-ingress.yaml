# INVALID - Ingress without TLS
# This should be rejected by IngressTLSRequired validator
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: invalid-ingress
spec:
  rules:
  - host: example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: my-service
            port:
              number: 80
