# Valid pod - should be accepted and mutated (governance labels injected)
# Resources are already set; only labels will be added by the mutating webhook.
apiVersion: v1
kind: Pod
metadata:
  name: valid-test-pod
spec:
  containers:
  - name: app
    image: alpine:3.18
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    command:
    - sleep
    - "3600"
